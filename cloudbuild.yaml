substitutions:
  _REGION: asia-southeast2
  _REPOSITORY: cetak-struk
  _IMAGE_NAME: app
  _SERVICE_NAME: cetak-struk
  _APP_URL: https://cetak-struk-xxxxx-uc.a.run.app
  _DB_CONNECTION: mysql
  _DB_DATABASE: cetak_struk
  _DB_USERNAME: app_user
  _CLOUD_SQL_CONNECTION: project-id:asia-southeast2:instance-name
  _APP_KEY_SECRET: laravel-app-key
  _DB_PASSWORD_SECRET: cetak-struk-db-password

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --add-cloudsql-instances
      - ${_CLOUD_SQL_CONNECTION}
      - --set-env-vars
      - APP_ENV=production,APP_DEBUG=false,APP_URL=${_APP_URL},DB_CONNECTION=${_DB_CONNECTION},DB_DATABASE=${_DB_DATABASE},DB_USERNAME=${_DB_USERNAME},CLOUD_SQL_INSTANCE_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION},TRUST_PROXIES=*
      - --update-secrets
      - APP_KEY=${_APP_KEY_SECRET}:latest,DB_PASSWORD=${_DB_PASSWORD_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
